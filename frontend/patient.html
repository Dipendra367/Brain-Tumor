<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrainDetect — Patient Results</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,14,26,0.85); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.show { display: flex; }
    .chat-modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 520px; height: 600px;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6); overflow: hidden;
    }
    .chat-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
    }
    .chat-header-info h3 { font-size: 1rem; color: var(--text); margin-bottom: 2px; }
    .chat-header-info p  { font-size: 0.8rem; color: var(--accent); }
    .chat-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.4rem; cursor: pointer; padding: 4px; line-height: 1;
    }
    .chat-close:hover { color: var(--text); }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-msg {
      max-width: 75%; padding: 10px 14px;
      border-radius: 14px; font-size: 0.9rem; line-height: 1.5;
    }
    .chat-msg.doctor {
      background: var(--bg-input); color: var(--text);
      align-self: flex-start; border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .chat-msg.patient {
      background: var(--accent); color: #0a0e1a;
      align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500;
    }
    .chat-msg-time { font-size: 0.7rem; opacity: 0.6; margin-top: 4px; }
    .chat-msg.patient .chat-msg-time { text-align: right; }
    .chat-input-area {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; background: var(--bg);
    }
    .chat-input-area input {
      flex: 1; padding: 10px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 20px;
      color: var(--text); font-size: 0.9rem;
    }
    .chat-input-area input:focus { border-color: var(--accent); outline: none; }
    .chat-send-btn {
      background: var(--accent); color: #0a0e1a; border: none;
      border-radius: 50%; width: 40px; height: 40px; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-send-btn:hover { background: #00b8d9; }
    .chat-empty { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin: auto; }
  </style>
</head>
<body>
<div class="page patient-hero">

  <!-- Chat Modal -->
  <div class="modal-overlay" id="chatModal">
    <div class="chat-modal">
      <div class="chat-header">
        <div class="chat-header-info">
          <h3>Chat with Your Doctor</h3>
          <p id="chatReportId"></p>
        </div>
        <button class="chat-close" onclick="closeChat()">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">No messages yet. Ask your doctor a question!</div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Type a message..."
               onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button class="chat-send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <div class="patient-card">

    <div class="auth-logo">
      <h1>Brain<span style="color:var(--text)">Detect</span></h1>
      <p>View your diagnostic report</p>
    </div>

    <!-- Lookup Section -->
    <div id="lookupSection">
      <div class="alert" id="lookupAlert"></div>
      <div class="form-group">
        <label>Enter your Report ID</label>
        <input type="text" id="reportIdInput" placeholder="e.g. BD-2026-841F"
               style="text-align:center;font-size:1.2rem;letter-spacing:2px;font-weight:600"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="lookupReport()">
        🔍 View My Results
      </button>
    </div>

    <div class="divider"></div>

    <!-- Result Section -->
    <div id="resultSection" style="display:none">

      <div style="margin-bottom:20px;">
        <p style="color:var(--text-muted);font-size:0.85rem">Report ID</p>
        <p style="color:var(--accent);font-weight:700;font-size:1.1rem" id="displayReportId"></p>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px">
          Patient: <span style="color:var(--text)" id="displayPatientName"></span>
        </p>
      </div>

      <!-- Diagnosis -->
      <div class="result-box">
        <div class="result-class" id="patResultClass"></div>
        <div style="color:var(--text-muted);font-size:0.9rem;margin-top:8px" id="patResultInfo"></div>
        <div style="margin-top:16px;">
          <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:6px;">
            <span style="color:var(--text-muted)">Confidence</span>
            <span style="color:var(--accent);font-weight:600" id="patConfidenceText"></span>
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill" id="patConfidenceFill" style="width:0%"></div>
          </div>
        </div>
        <div class="score-grid" id="patScoreGrid"></div>
      </div>

      <!-- GradCAM -->
      <div style="margin-top:24px;">
        <p class="section-title" style="margin-bottom:12px;">AI Focus Area (Grad-CAM)</p>
        <div style="border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);">
          <img id="patGradcam" src="" alt="Grad-CAM" style="width:100%;display:block;"/>
        </div>
        <p style="color:var(--text-muted);font-size:0.8rem;margin-top:8px;text-align:center">
          Red/yellow areas = regions the AI focused on for this diagnosis
        </p>
      </div>

      <div class="divider"></div>

      <!-- Action Buttons -->
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-primary btn-full" onclick="downloadPDF()">
          📄 Download My Report (PDF)
        </button>
        <button class="btn btn-secondary btn-full" onclick="openChat()"
                style="border-color:var(--accent);color:var(--accent);">
          💬 Chat with Your Doctor
        </button>
        <button class="btn btn-secondary btn-full" onclick="resetLookup()">
          ← Look up another report
        </button>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection,
    addDoc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA7QZBDSeJN_ShK8BDAUmzG3Umob2L_8G8",
    authDomain: "braindetect-1842e.firebaseapp.com",
    projectId: "braindetect-1842e",
    storageBucket: "braindetect-1842e.firebasestorage.app",
    messagingSenderId: "760444584185",
    appId: "1:760444584185:web:389962bf21b8b7e90c6228"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const API = "https://brain-tumor-production-dd38.up.railway.app";

  let currentReportId = null;
  let chatUnsubscribe = null;

  // ── Lookup report ──────────────────────────────────────
  window.lookupReport = async () => {
    const reportId = document.getElementById('reportIdInput').value.trim();
    if (!reportId) { showAlert('Please enter a Report ID'); return; }

    try {
      const res  = await fetch(`${API}/api/history/patient/${reportId}`);
      const data = await res.json();
      if (!res.ok) { showAlert(data.detail || 'Report not found. Check your Report ID.'); return; }
      currentReportId = reportId;
      displayResult(data);
    } catch (err) { showAlert('Connection error. Please try again.'); }
  };

  function displayResult(data) {
    document.getElementById('lookupSection').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';

    document.getElementById('displayReportId').textContent    = data.report_id;
    document.getElementById('displayPatientName').textContent = data.patient_name;

    const cls = document.getElementById('patResultClass');
    cls.textContent = data.prediction_class;
    cls.className   = `result-class ${data.severity}`;

    document.getElementById('patResultInfo').textContent     = data.info;
    document.getElementById('patConfidenceText').textContent = `${data.confidence.toFixed(1)}%`;

    setTimeout(() => {
      document.getElementById('patConfidenceFill').style.width = `${data.confidence}%`;
    }, 100);

    document.getElementById('patScoreGrid').innerHTML =
      Object.entries(data.all_scores).map(([c, s]) =>
        `<div class="score-item"><span>${c}</span><span>${s.toFixed(1)}%</span></div>`
      ).join('');

    if (data.gradcam_overlay) {
      document.getElementById('patGradcam').src = `data:image/png;base64,${data.gradcam_overlay}`;
    }
  }

  // ── Download PDF ───────────────────────────────────────
  window.downloadPDF = async () => {
    if (!currentReportId) return;
    try {
      const res = await fetch(`${API}/api/report/patient/${currentReportId}`);
      if (!res.ok) { alert('PDF generation failed'); return; }
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `BrainDetect_${currentReportId}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) { alert('Error: ' + err.message); }
  };

  // ── Chat ───────────────────────────────────────────────
  window.openChat = () => {
    if (!currentReportId) return;
    document.getElementById('chatReportId').textContent = `Report: ${currentReportId}`;
    document.getElementById('chatModal').classList.add('show');
    subscribeToChat(currentReportId);
  };

  window.closeChat = () => {
    document.getElementById('chatModal').classList.remove('show');
    if (chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; }
  };

  function subscribeToChat(reportId) {
    const q = query(
      collection(db, 'chats', reportId, 'messages'),
      orderBy('timestamp', 'asc')
    );
    chatUnsubscribe = onSnapshot(q, (snapshot) => {
      const container = document.getElementById('chatMessages');
      if (snapshot.empty) {
        container.innerHTML = '<div class="chat-empty">No messages yet. Ask your doctor a question!</div>';
        return;
      }
      container.innerHTML = '';
      snapshot.forEach(docSnap => {
        const msg  = docSnap.data();
        const time = msg.timestamp?.toDate
          ? msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : '';
        const div = document.createElement('div');
        div.className = `chat-msg ${msg.sender}`;
        div.innerHTML = `<div>${msg.text}</div><div class="chat-msg-time">${time}</div>`;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });
  }

  window.sendMessage = async () => {
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text || !currentReportId) return;
    input.value = '';
    try {
      await addDoc(collection(db, 'chats', currentReportId, 'messages'), {
        text: text, sender: 'patient', timestamp: serverTimestamp(),
      });
    } catch (err) { alert('Failed to send: ' + err.message); }
  };

  // ── Helpers ────────────────────────────────────────────
  window.resetLookup = () => {
    document.getElementById('lookupSection').style.display = 'block';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('reportIdInput').value = '';
    currentReportId = null;
    hideAlert();
  };

  function showAlert(msg) {
    const el = document.getElementById('lookupAlert');
    el.textContent = msg;
    el.className = 'alert alert-error show';
  }
  function hideAlert() {
    document.getElementById('lookupAlert').className = 'alert'; }

  document.getElementById('reportIdInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') lookupReport();
  });
</script>
</body>
</html>
