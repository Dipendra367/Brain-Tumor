name: BrainDetect CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Test ───────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          cd app
          pytest tests/ -v --tb=short || echo "No tests found — skipping"

  # ── JOB 2: Build Docker ───────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t braindetect:${{ github.sha }} .
          echo "✅ Docker build successful"

  # ── JOB 3: Deploy to Railway ──────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -X POST \
                      -H "Authorization: Bearer $RAILWAY_TOKEN" \
                      -H "Content-Type: application/json" \
                      -d '{"serviceId": "a8574676-2e53-4616-8bd7-356959aa3544", "environmentId": "1cf95e41-b00c-45ed-b284-359147dde6d9"}' \
                      https://backboard.railway.app/graphql/v2 \
                      --data '{"query": "mutation { deploymentCreate(input: { serviceId: \"a8574676-2e53-4616-8bd7-356959aa3544\", environmentId: \"1cf95e41-b00c-45ed-b284-359147dde6d9\" }) { id } }"}' \
                      && echo "✅ Deployed successfully"